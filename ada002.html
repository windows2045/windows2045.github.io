<!DOCTYPE html>
<html>
<head>
  <title>ADA Issues</title>
  <style>
    body { font-family: Arial, sans-serif; color: #999; background: #fff; }
    .fake-heading { font-size: 28px; font-weight: bold; }
    .button { background: #ccc; padding: 10px; display: inline-block; cursor: pointer; }
    .tiny { font-size: 10px; }
    .error { color: red; }
    input:focus, a:focus, button:focus { outline: none; }
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container text-center">
   

  <div class="fake-heading">City Services Request Form</div> 

  <img src="cityhall.png"> 

  <p class="tiny">Please complete this form to request city services.</p> 

  <p>Click <a href="#">here</a> to learn more.</p> 

  <div class="button" onclick="alert('Submitted')">Submit Request</div> 

  <form>
    <p>Name</p>
    <input type="text" name="name"> 

    <p>Email</p>
    <input type="text" name="email"> 

    <p class="error">Required field missing</p> 

    <input type="text" placeholder="Phone number"> 

    <select name="department"> 
      <option>Choose one</option>
      <option>Public Works</option>
      <option>Transportation</option>
    </select>

    <table border="1"> 
      <tr><td>Monday</td><td>8 AM - 5 PM</td></tr>
      <tr><td>Tuesday</td><td>8 AM - 5 PM</td></tr>
    </table>

    <video controls src="announcement.mp4"></video> 

    <audio controls src="notice.mp3"></audio> 

    <div id="status"></div> 

    <p style="color:red;">Fields in red are required.</p> 

    <input type="checkbox" name="agree"> I agree to the terms 

    <button type="button" onclick="document.getElementById('modal').style.display='block'">Open Help</button>
    <div id="modal" style="display:none; border:1px solid #000; padding:15px;">
      Help information
      <button onclick="document.getElementById('modal').style.display='none'">X</button> 
    </div>
  </form>
  </div>
</body>
</html>
