<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Services</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #ffffff;
            color: #222222;
            margin: 20px;
            line-height: 1.5;
        }
        header h1 {
            font-size: 36px;
            color: #222222;
        }
        nav ul {
            list-style: none;
            padding: 0;
        }
        nav li {
            display: inline-block;
            margin-right: 20px;
        }
        nav a {
            color: #0645ad;
            text-decoration: underline;
        }
        .help-text {
            font-size: 16px;
        }
        img {
            max-width: 100%;
            height: auto;
        }
        label {
            display: block;
            font-weight: bold;
            margin-top: 10px;
        }
        input {
            margin-bottom: 6px;
            padding: 6px;
            width: 260px;
            max-width: 100%;
        }
        .error {
            color: #b00020;
            font-weight: bold;
        }
        button {
            background: #0645ad;
            color: #ffffff;
            border: none;
            padding: 10px 14px;
            cursor: pointer;
        }
        button:focus,
        a:focus,
        input:focus {
            outline: 3px solid #ffbf47;
            outline-offset: 2px;
        }
    </style>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container text-center">
    <!-- Fix 1: Added lang="en" to the html element -->
    <!-- Fix 2: Added semantic landmarks: header, nav, main, section, footer -->
    <header>
        <h1>City Services Portal</h1>
    </header>

    <!-- Fix 3: Replaced clickable spans with real links -->
    <nav aria-label="Main navigation">
        <ul>
            <li><a href="#services">Services</a></li>
            <li><a href="#contact">Contact</a></li>
            <li><a href="#apply">Apply</a></li>
        </ul>
    </nav>

    <main>
        <section id="services" aria-labelledby="services-heading">
            <!-- Fix 4: Used proper heading order -->
            <h2 id="services-heading">Available Services</h2>

            <!-- Fix 5: Improved color contrast and readable font size -->
            <p class="help-text">Use this page to apply for permits, report issues, and contact the city.</p>

            <!-- Fix 6: Added meaningful alt text -->
            <img src="floorplan.jpg" width="500" height="180" alt="Illustration of city buildings and public services">

            <!-- Fix 7: Replaced vague link text with descriptive link text -->
            <p><a href="https://lacity.gov/myla311">Learn more about city programs</a>.</p>
        </section>

        <section id="apply" aria-labelledby="apply-heading">
            <h2 id="apply-heading">Application Form</h2>

            <form>
                <!-- Fix 8: Added explicit labels for form inputs -->
                <label for="name">Name</label>
                <input id="name" name="name" type="text" autocomplete="name" required>

                <label for="email">Email</label>
                <input id="email" name="email" type="email" autocomplete="email" required>

                <!-- Fix 9: Associated the error message with the field using aria-describedby -->
                <label for="permit-number">Permit Number</label>
                <input id="permit-number" name="permit-number" type="text" aria-describedby="permit-error" aria-invalid="true" required>
                <div id="permit-error" class="error">Permit number is required.</div>

                <!-- Fix 10: Replaced fake div button with a real keyboard-accessible button -->
                <button type="submit">Submit Application</button>
            </form>
        </section>

        <section id="contact" aria-labelledby="contact-heading">
            <h2 id="contact-heading">Contact</h2>
            <p>Phone: <a href="tel:5555555555">555-555-5555</a></p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 City Services</p>
    </footer>
</div>
</body>
</html>
